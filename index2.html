<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zvířecí Poznávačka</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #4a90e2;
            --text: #333;
        }

        body {
            margin: 0; font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
            align-items: center; justify-content: center;
        }

        .app-container {
            width: 90%; max-width: 400px; text-align: center;
        }

        .card {
            background: var(--card); border-radius: 25px;
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px; min-height: 400px;
            display: flex; flex-direction: column; align-items: center;
        }

        .animal-img {
            width: 100%; height: 250px; object-fit: cover;
            border-radius: 15px; margin-bottom: 20px;
            background: #eee;
        }

        #answer {
            font-size: 1.8rem; font-weight: bold; color: var(--primary);
            margin: 10px 0; min-height: 2.2rem; visibility: hidden;
        }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s; margin-bottom: 10px;
        }

        .btn-reveal { background: var(--primary); color: white; }
        .btn-next { background: #34c759; color: white; display: none; }
        
        .btn:active { transform: scale(0.98); }

        .progress { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <img id="animal-image" class="animal-img" src="" alt="Zvíře">
        <div id="answer">???</div>
        <button id="reveal-btn" class="btn btn-reveal" onclick="reveal()">UKÁZAT NÁZEV</button>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">DALŠÍ ZVÍŘE ➔</button>
        <div class="progress" id="progress">Načítám...</div>
    </div>
</div>

<script>
    // Seznam zvířat (můžeš si sem přidat další)
    const quizData = [
        { name: "Lev", img: "http://googleusercontent.com/image_collection/image_retrieval/2641472515327824393_0" },
        { name: "Slon", img: "http://googleusercontent.com/image_collection/image_retrieval/4801493615197016726_0" },
        { name: "Žirafa", img: "http://googleusercontent.com/image_collection/image_retrieval/14990773705399737238_0" },
        { name: "Tučňák", img: "http://googleusercontent.com/image_collection/image_retrieval/106045820223358885_0" }
    ];

    let currentIndex = 0;

    function updateCard() {
        const animal = quizData[currentIndex];
        document.getElementById('animal-image').src = animal.img;
        document.getElementById('answer').innerText = animal.name;
        document.getElementById('answer').style.visibility = 'hidden';
        document.getElementById('reveal-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress').innerText = `Zvíře ${currentIndex + 1} z ${quizData.length}`;
    }

    function reveal() {
        document.getElementById('answer').style.visibility = 'visible';
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(50);
    }

    function nextQuestion() {
        currentIndex = (currentIndex + 1) % quizData.length;
        updateCard();
    }

    // Inicializace první karty
    updateCard();
</script>

</body>
</html>
